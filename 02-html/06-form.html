<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form | html</title>
  </head>
  <body>
    <h1>html</h1>
    <h2>form</h2>

    <form action="/action_page.php">
      <fieldset>
        <legend>
          <!-- 제목/주제 -->
          회원가입
        </legend>

        <label for="id">아이디</label>
        <input type="text" id="id" name="id" title="아이디" />
        <!-- label의 for, input의 id값이 같아야 한 세트로 묶임 -->
        <!-- input의 name값 : input의 데이터를 넘길 때 사용됨 -->
        <!-- 웹접근성을 위해 label 사용해야 하지만 사용하지 않을 때는
        title이라도 넣기 -->
        <hr />
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" name="pw" />
        <hr />

        <label for="animals">좋아하는 동물</label>
        <select name="animals" id="animals">
          <option value="cat">cat</option>
          <option value="dog">dog</option>
          <option value="fish" selected>fish</option>
        </select>

        <label for="text">남기고 싶은 말</label>
        <textarea name="text" id="text" rows="10"></textarea>
        <hr />

        <button>버튼</button>
        <!-- 여닫는 태그가 있어 이미지같은 오브젝트를 넣을 수 있음 -->
        <input type="button" value="버튼" />
        <!-- 단일태그라 오브젝트 넣기 어려움 -->
        <hr />

        <input type="radio" name="gender" id="m" />
        <label for="m">남자</label>
        <input type="radio" name="gender" id="f" />
        <label for="f">여자</label>
        <!-- name : 분류 그룹화 -->
        <hr />

        <input type="checkbox" name="cat" id="cat" />
        <label for="cat">고양이</label>
        <input type="checkbox" name="dog" id="dog" />
        <label for="dog">강아지</label>
        <input type="checkbox" name="fish" id="fish" />
        <label for="fish">물고기</label>
        <hr />
        <input type="reset" value="취소" />
        <input type="submit" value="회원가입" />
      </fieldset>
    </form>
  </body>
</html>
